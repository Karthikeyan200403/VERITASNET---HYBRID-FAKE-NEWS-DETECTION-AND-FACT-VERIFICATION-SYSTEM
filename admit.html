<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - VeritasNet</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f4f8;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    background: #0b3d91;
    padding: 15px 30px;
    color: white;
}

.navbar a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

/* CONTAINER */
.container {
    padding: 25px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
    margin-top: 20px;
}

.card {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 8px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* CHART SECTION */
.section {
    display: flex;
    gap: 20px;
    margin-top: 25px;
}

.box {
    flex: 1;
    background: white;
    padding: 15px;
    border-radius: 8px;
}

/* SIMPLE GRAPH */
.graph {
    height: 150px;
    background: linear-gradient(to top, #1e5eff, #a6c8ff);
    border-radius: 5px;
}

/* PIE CHART (FAKE DESIGN) */
.pie {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: conic-gradient(
        #28a745 0% 50%,
        #dc3545 50% 75%,
        #ffc107 75% 100%
    );
    margin: auto;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>VeritasNet</b></div>

    <div>
        <a href="dashboard.html">Dashboard</a>
        <a href="users.html">Users</a>
        <a href="sources.html">Sources</a>
        <a href="reports.html">Reports</a>
        <a href="login.html">Logout</a>
    </div>
</div>

<!-- MAIN -->
<div class="container">

<h2>Admin Dashboard</h2>

<!-- TOP CARDS -->
<div class="cards">

    <div class="card">
        <h3>1,248</h3>
        <p>Total Users</p>
    </div>

    <div class="card">
        <h3>3,456</h3>
        <p>Total Verifications</p>
    </div>

    <div class="card">
        <h3>23</h3>
        <p>Pending Items</p>
    </div>

    <div class="card">
        <h3>86%</h3>
        <p>Avg Accuracy</p>
    </div>

</div>

<!-- CHARTS -->
<div class="section">

    <!-- GRAPH -->
    <div class="box">
        <h3>Verifications (Last 7 Days)</h3>
        <div class="graph"></div>
    </div>

    <!-- PIE -->
    <div class="box">
        <h3>Credibility Distribution</h3>
        <div class="pie"></div>

        <p style="text-align:center; font-size:13px;">
            ✔ Reliable &nbsp; ❌ Unreliable &nbsp; ⚠ Pending
        </p>
    </div>

</div>

</div>

</body>
</html>
