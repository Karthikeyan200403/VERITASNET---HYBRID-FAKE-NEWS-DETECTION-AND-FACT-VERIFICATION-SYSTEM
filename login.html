<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - VeritasNet</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f8;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-weight: bold;
            color: #0b3d91;
        }

        .nav-links a {
            margin: 0 10px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }

        .start-btn {
            background: #0b3d91;
            color: white;
            padding: 8px 14px;
            border-radius: 4px;
            border: none;
        }

        /* CENTER BOX */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 320px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            background: #1e5eff;
            color: white;
            border: none;
            border-radius: 4px;
            margin-top: 10px;
            cursor: pointer;
        }

        .forgot {
            margin-top: 10px;
            font-size: 12px;
            color: #1e5eff;
            cursor: pointer;
        }

    </style>
</head>

<body>

     <div class="navbar">

    <!-- LOGO -->
    <div class="logo">
        VeritasNet
    </div>

    <!-- MENU -->
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="article.html">Features</a>
        <a href="news.html">News</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>

    
</a>

</div>

    <!-- LOGIN FORM -->
    <div class="container">
        <div class="login-box">
            <h2>Login</h2>

            <input type="email" placeholder="Enter your email">
            <input type="password" placeholder="Enter your password">

             <!-- Login Button -->
    <button class="login-btn" onclick="location.href='dashboard.html'">
        Login
    </button>

    <button class="login-btn" onclick="location.href='signup.html'">
        Signup
    </button>

        </div>
    </div>

</body>
</html>
