<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify News - VeritasNet</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2f4f8;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    background: #0b3d91;
    padding: 15px 30px;
    color: white;
}

.navbar a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    padding: 40px;
}

/* CARD */
.card {
    background: white;
    padding: 25px;
    width: 600px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* FORM */
textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    margin-top: 10px;
}

.btn {
    margin-top: 15px;
    background: #1e5eff;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    float: right;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>VeritasNet</b></div>

    <div>
        <a href="dashboard.html">Dashboard</a>
        <a href="verify.html">Verify</a>
        <a href="news.html">News</a>
        <a href="login.html">Logout</a>
    </div>
</div>

<!-- FORM -->
<div class="container">
    <div class="card">

        <h2>Fact Verification</h2>

        <p>Enter the statement to verify:</p>

        <textarea placeholder="Type or paste the news statement here..."></textarea>

        <!-- Button goes to result page -->
        <button class="btn" onclick="location.href='result.html'">
            Verify
        </button>

    </div>
</div>

</body>
</html>
